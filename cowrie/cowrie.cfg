[honeypot]
hostname = ubuntu-prod-db

[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0

[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

[output_jsonlog]
enabled = true
logfile = /tmp/cowrie-logs/cowrie.json

[database_sqlite]
enabled = true
path = /tmp/cowrie-var/cowrie.db
